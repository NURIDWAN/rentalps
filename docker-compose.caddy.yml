services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN:?Set API_DOMAIN in .env.production}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - rentalps

volumes:
  caddy_data:
  caddy_config:
