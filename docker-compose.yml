name: rentalps

services:
  backend:
    build:
      context: .
      target: runner
    image: rentalps-backend:latest
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      TLS_ENABLED: "false"
      TLS_MIN_VERSION: TLSv1.2
      PGHOST: postgres
      PGPORT: 5432
      PGSSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.PORT||8080; fetch('http://127.0.0.1:'+port+'/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - rentalps

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-ps_rental}
      POSTGRES_USER: ${PGUSER:-ps_rental}
      POSTGRES_PASSWORD: ${PGPASSWORD:?Set PGPASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentalps

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.production}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentalps

volumes:
  postgres_data:
  redis_data:

networks:
  rentalps:
